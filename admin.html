<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exclusives PH — Admin</title>
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">
  <link rel="shortcut icon" href="images/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- Export libraries: SheetJS (xlsx) + jsPDF with the AutoTable plugin -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: { serif: ['Fraunces','serif'], sans: ['Archivo','sans-serif'], mono: ['Space Mono','monospace'] },
        colors: { brand: {
          obsidian:'#0A1A24', slate:'#102A38', gold:'#F5C518',
          goldDim:'rgba(245,197,24,0.15)', ice:'#F2EADD', muted:'#8AA0AD'
        }}
      }}
    }
  </script>
  <script>window.API_BASE = "https://exclusivesph.onrender.com";</script>
</head>
<body class="bg-brand-obsidian text-brand-ice font-sans antialiased min-h-screen">

  <div id="gate" class="min-h-screen flex items-center justify-center px-6">
    <div class="w-full max-w-sm bg-brand-slate border border-white/5 rounded-3xl p-8">
      <h1 class="font-serif text-2xl text-brand-gold mb-2">Admin access</h1>
      <p class="text-brand-muted text-xs font-light mb-6">Enter the admin key to view the guestlist.</p>
      <input id="key-input" type="password" placeholder="Admin key"
             class="w-full bg-brand-obsidian border border-white/10 rounded-xl focus:border-brand-gold text-brand-ice text-sm px-4 py-3 outline-none mb-4">
      <button id="key-submit" class="w-full py-3 rounded-full bg-brand-gold text-brand-obsidian font-mono text-xs font-bold tracking-widest uppercase hover:bg-brand-ice transition-colors">Enter</button>
      <p id="gate-error" class="text-red-400 text-xs font-mono mt-3 hidden"></p>
    </div>
  </div>

  <div id="dash" class="hidden max-w-7xl mx-auto px-6 py-10">
    <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
      <div>
        <h1 class="font-serif text-3xl md:text-4xl text-brand-ice">Guestlist</h1>
        <p class="text-brand-muted text-xs font-mono tracking-widest uppercase mt-1">Exclusives PH — Manila Bay</p>
      </div>
      <div class="flex items-center gap-3">
        <!-- Remind Pending Button -->
        <button id="remind-pending" title="Send payment reminders to checked pending bookings (or all if none checked)" class="font-mono text-[11px] tracking-widest uppercase border border-amber-400/40 text-amber-300 hover:bg-amber-400/10 hover:border-amber-300 rounded-full px-5 py-2 transition-colors">Remind Pending</button>
        <button id="export-xlsx" title="Full manifest + a Bookings sheet for reconciliation" class="font-mono text-[11px] tracking-widest uppercase border border-emerald-400/40 text-emerald-300 hover:bg-emerald-400/10 hover:border-emerald-300 rounded-full px-5 py-2 transition-colors">Excel (Full)</button>
        <button id="export-names" title="Guest name, who booked them, ticket code — nothing else" class="font-mono text-[11px] tracking-widest uppercase border border-cyan-400/40 text-cyan-300 hover:bg-cyan-400/10 hover:border-cyan-300 rounded-full px-5 py-2 transition-colors">Excel (Names)</button>
        <button id="export-pdf" title="Printable A4 passenger manifest for the yacht club" class="font-mono text-[11px] tracking-widest uppercase border border-brand-gold/40 text-brand-gold hover:bg-brand-goldDim/30 hover:border-brand-gold rounded-full px-5 py-2 transition-colors">Export PDF</button>
        <button id="refresh" class="font-mono text-[11px] tracking-widest uppercase border border-white/10 hover:border-brand-gold hover:text-brand-gold rounded-full px-5 py-2 transition-colors">Refresh</button>
        <button id="logout" class="font-mono text-[11px] tracking-widest uppercase text-brand-muted hover:text-brand-ice rounded-full px-3 py-2 transition-colors">Log out</button>
      </div>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-8">
      <div class="bg-brand-slate border border-white/5 rounded-2xl p-5">
        <div class="font-mono text-[10px] tracking-widest text-brand-muted uppercase mb-2">Confirmed revenue</div>
        <div id="stat-revenue" class="font-serif text-2xl text-brand-gold">₱0</div>
      </div>
      <div class="bg-brand-slate border border-cyan-400/30 bg-cyan-400/5 rounded-2xl p-5">
        <div class="font-mono text-[10px] tracking-widest text-cyan-300 uppercase mb-2">Needs Approval</div>
        <div id="stat-verifying" class="font-serif text-2xl text-cyan-300">0</div>
      </div>
      <div class="bg-brand-slate border border-white/5 rounded-2xl p-5">
        <div class="font-mono text-[10px] tracking-widest text-brand-muted uppercase mb-2">Confirmed</div>
        <div id="stat-confirmed" class="font-serif text-2xl text-brand-ice">0</div>
      </div>
      <div class="bg-brand-slate border border-white/5 rounded-2xl p-5">
        <div class="font-mono text-[10px] tracking-widest text-brand-muted uppercase mb-2">Pending</div>
        <div id="stat-pending" class="font-serif text-2xl text-brand-ice">0</div>
      </div>
      <div class="bg-brand-slate border border-white/5 rounded-2xl p-5">
        <div class="font-mono text-[10px] tracking-widest text-brand-muted uppercase mb-2">Guests confirmed</div>
        <div id="stat-guests" class="font-serif text-2xl text-brand-ice">0</div>
      </div>
    </div>

    <div class="flex flex-wrap gap-2 mb-3" id="filters">
      <button data-filter="all"       class="filter-btn font-mono text-[11px] tracking-widest uppercase rounded-full px-4 py-2 border border-brand-gold bg-brand-goldDim/20 text-brand-gold">All</button>
      <button data-filter="verifying" class="filter-btn font-mono text-[11px] tracking-widest uppercase rounded-full px-4 py-2 border border-white/10 text-brand-muted hover:text-cyan-300 hover:border-cyan-300 transition-colors">Needs Approval</button>
      <button data-filter="confirmed" class="filter-btn font-mono text-[11px] tracking-widest uppercase rounded-full px-4 py-2 border border-white/10 text-brand-muted hover:text-brand-gold hover:border-brand-gold transition-colors">Confirmed</button>
      <button data-filter="pending"   class="filter-btn font-mono text-[11px] tracking-widest uppercase rounded-full px-4 py-2 border border-white/10 text-brand-muted hover:text-brand-gold hover:border-brand-gold transition-colors">Pending</button>
      <button data-filter="cancelled" class="filter-btn font-mono text-[11px] tracking-widest uppercase rounded-full px-4 py-2 border border-white/10 text-brand-muted hover:text-brand-gold hover:border-brand-gold transition-colors">Cancelled</button>
    </div>

    <div id="export-hint" class="font-mono text-[11px] text-brand-muted mb-4">&nbsp;</div>

    <div class="bg-brand-slate border border-white/5 rounded-2xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm min-w-[950px]">
          <thead class="bg-brand-obsidian/50 text-brand-muted font-mono text-[10px] tracking-widest uppercase">
            <tr>
              <th class="px-4 py-3 w-10 text-center"><input type="checkbox" id="select-all-cb" title="Select / deselect all visible pending bookings" class="rounded bg-brand-obsidian border-white/20 accent-brand-gold cursor-pointer w-4 h-4"></th>
              <th class="text-left px-4 py-3">Guest</th>
              <th class="text-left px-4 py-3">Instagram</th>
              <th class="text-left px-4 py-3">Referred by</th>
              <th class="text-left px-4 py-3">Table / Package</th>
              <th class="text-left px-4 py-3">Pax</th>
              <th class="text-left px-4 py-3">Total</th>
              <th class="text-left px-4 py-3">Receipt</th>
              <th class="text-left px-4 py-3">Status</th>
              <th class="text-left px-4 py-3">Ticket</th>
              <th class="text-left px-4 py-3">Created</th>
              <th class="text-right px-4 py-3">Action</th>
            </tr>
          </thead>
          <tbody id="rows" class="divide-y divide-white/5"></tbody>
        </table>
      </div>
      <div id="empty" class="hidden text-center text-brand-muted text-sm font-light py-12">No bookings yet.</div>
      <div id="loading" class="text-center text-brand-muted text-sm font-light py-12">Loading…</div>
    </div>
  </div>

  <script>
  (function () {
    'use strict';
    const API_BASE = (window.API_BASE || 'https://exclusivesph.onrender.com').replace(/\/+$/, '');
    const peso = (n) => '\u20B1' + Number(n || 0).toLocaleString('en-PH');
    const $ = (id) => document.getElementById(id);

    let adminKey = sessionStorage.getItem('exc_admin_key') || '';
    let currentFilter = 'all';
    let allRows = [];

    const SPOT_NAMES = {
      LC1: 'SVIP 1', LC2: 'SVIP 2', LC3: 'SVIP 3', LC5: 'SVIP 4', LC6: 'SVIP 5',
      LC4: 'VIP 1',  LC7: 'VIP 2',  DC1: 'VIP 3',  DC2: 'VIP 4',
      DT1: 'Table 1', DT2: 'Table 2',
    };

    const EVENT = {
      name: 'Exclusives PH — Manila Bay Yacht Party',
      date: 'August 14, 2026',
      venue: 'Manila Yacht Club, CCP Complex, Roxas Blvd, Malate, Manila',
      boarding: 'Check-in 21:00 · Departure 21:30',
    };

    const NO_NAME = '(name not provided)';
    const PDF_COLUMNS = 2;

    const SCOPE_LABEL = {
      all: 'All bookings',
      confirmed: 'Confirmed only',
      verifying: 'Needs approval',
      pending: 'Pending',
      cancelled: 'Cancelled',
    };

    function spotLabel(id) {
      if (!id) return 'Solo Entrance';
      return SPOT_NAMES[id] ? SPOT_NAMES[id] + ' (' + id + ')' : id;
    }

    const gate = $('gate'), dash = $('dash');
    function showDash() { gate.classList.add('hidden'); dash.classList.remove('hidden'); }
    function showGate() { dash.classList.add('hidden'); gate.classList.remove('hidden'); }

    async function tryKey(key) {
      const res = await fetch(`${API_BASE}/api/bookings?limit=1`, { headers: { 'X-Admin-Key': key } });
      return res.ok;
    }

    $('key-submit').addEventListener('click', submitKey);
    $('key-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') submitKey(); });

    async function submitKey() {
      const key = $('key-input').value.trim();
      const err = $('gate-error');
      err.classList.add('hidden');
      if (!key) return;
      try {
        if (await tryKey(key)) {
          adminKey = key;
          sessionStorage.setItem('exc_admin_key', key);
          showDash();
          load();
        } else {
          err.textContent = 'Invalid admin key.';
          err.classList.remove('hidden');
        }
      } catch (e) {
        err.textContent = 'Could not reach the server. Is the backend running?';
        err.classList.remove('hidden');
      }
    }

    $('logout').addEventListener('click', () => {
      sessionStorage.removeItem('exc_admin_key');
      adminKey = '';
      $('key-input').value = '';
      showGate();
    });

    $('refresh').addEventListener('click', load);

    document.querySelectorAll('.filter-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        currentFilter = btn.getAttribute('data-filter');
        document.querySelectorAll('.filter-btn').forEach((b) => {
          const active = b === btn;
          if (currentFilter === 'verifying' && active) {
             b.classList.add('border-cyan-400', 'bg-cyan-400/10', 'text-cyan-300');
             b.classList.remove('border-white/10', 'text-brand-muted');
          } else if (active) {
             b.classList.add('border-brand-gold', 'bg-brand-goldDim/20', 'text-brand-gold');
             b.classList.remove('border-white/10', 'text-brand-muted');
          } else {
             b.className = 'filter-btn font-mono text-[11px] tracking-widest uppercase rounded-full px-4 py-2 border border-white/10 text-brand-muted hover:text-brand-gold hover:border-brand-gold transition-colors';
          }
        });
        render();
      });
    });

    async function load() {
      $('loading').classList.remove('hidden');
      $('empty').classList.add('hidden');
      try {
        const res = await fetch(`${API_BASE}/api/bookings?limit=1000`, { headers: { 'X-Admin-Key': adminKey } });
        if (res.status === 401) { showGate(); return; }
        allRows = await res.json();
        stats();
        render();
      } catch (e) {
        $('rows').innerHTML = '';
        $('empty').textContent = 'Could not load bookings. Is the backend running?';
        $('empty').classList.remove('hidden');
      } finally {
        $('loading').classList.add('hidden');
      }
    }

    function stats() {
      const confirmed = allRows.filter((r) => r.status === 'confirmed');
      const verifying = allRows.filter((r) => r.status === 'verifying');
      const pending = allRows.filter((r) => r.status === 'pending');
      const revenue = confirmed.reduce((s, r) => s + (r.total_amount || 0), 0);
      const guests = confirmed.reduce((s, r) => s + (r.guests || 0), 0);

      $('stat-revenue').textContent = peso(revenue);
      $('stat-verifying').textContent = verifying.length;
      $('stat-confirmed').textContent = confirmed.length;
      $('stat-pending').textContent = pending.length;
      $('stat-guests').textContent = guests;
    }

    const STATUS_STYLE = {
      confirmed: 'text-emerald-300 border-emerald-400/30 bg-emerald-400/10',
      verifying: 'text-cyan-300 border-cyan-400/30 bg-cyan-400/10',
      pending:   'text-brand-gold border-brand-gold/30 bg-brand-goldDim/20',
      cancelled: 'text-red-300 border-red-400/30 bg-red-400/10',
    };

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
        ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      const d = new Date(iso);
      return isNaN(d) ? '—' : d.toLocaleString('en-PH', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function exportRows() {
      return currentFilter === 'all' ? allRows : allRows.filter((r) => r.status === currentFilter);
    }

    function buildManifest(rows) {
      const out = [];
      rows.forEach((r) => {
        const lead = String(r.full_name || '').trim();
        const names = Array.isArray(r.guest_names)
          ? r.guest_names.map((n) => String(n).trim()).filter(Boolean)
          : [];

        const count = Math.max(Number(r.guests) || 0, names.length);
        const slots = [];
        for (let i = 0; i < count; i++) slots.push(names[i] || '');

        const hasLead = lead && names.some((n) => n.toLowerCase() === lead.toLowerCase());
        if (lead && !hasLead) {
          const gap = slots.indexOf('');
          if (gap !== -1) slots[gap] = lead;
        }

        slots.forEach((name) => {
          out.push({
            guest_name: name || NO_NAME,
            lead: lead,
            package: r.package || '',
            spot: spotLabel(r.table_id),
            ticket: r.ticket_code || '—',
            status: r.status || '',
            phone: r.phone || '',
            email: r.email || '',
          });
        });
      });
      out.sort((a, b) => {
        const aGap = a.guest_name === NO_NAME;
        const bGap = b.guest_name === NO_NAME;
        if (aGap !== bGap) return aGap ? 1 : -1;
        return a.guest_name.localeCompare(b.guest_name, 'en');
      });
      return out;
    }

    function scopeLabel() { return SCOPE_LABEL[currentFilter] || currentFilter; }

    function fileName(ext, kind) {
      const d = new Date().toISOString().slice(0, 10);
      return `ExclusivesPH_${kind || 'Manifest'}_${currentFilter}_${d}.${ext}`;
    }

    function scopeOk() {
      if (currentFilter === 'confirmed') return true;
      return confirm(
        'You are exporting "' + scopeLabel() + '", not just confirmed bookings.\n\n' +
        'The Manila Yacht Club manifest should normally list CONFIRMED passengers only.\n\n' +
        'Export anyway?'
      );
    }

    function updateExportHint() {
      const rows = exportRows();
      const manifest = buildManifest(rows);
      const missing = manifest.filter((m) => m.guest_name === NO_NAME).length;
      const el = $('export-hint');
      if (!rows.length) { el.innerHTML = '&nbsp;'; return; }
      let txt = `Export scope: ${scopeLabel()} — ${rows.length} booking${rows.length === 1 ? '' : 's'}, ${manifest.length} passenger${manifest.length === 1 ? '' : 's'}.`;
      el.textContent = txt;
      el.className = 'font-mono text-[11px] text-brand-muted mb-4';
      if (missing) {
        el.textContent = txt + `  ⚠ ${missing} name${missing === 1 ? '' : 's'} still missing.`;
        el.className = 'font-mono text-[11px] text-amber-300 mb-4';
      }
    }

    function exportExcel() {
      if (!window.XLSX) { alert('Excel library is still loading — give it a second and try again.'); return; }
      const rows = exportRows();
      if (!rows.length) { alert('Nothing to export in this view.'); return; }
      if (!scopeOk()) return;

      const manifest = buildManifest(rows);
      const missing = manifest.filter((m) => m.guest_name === NO_NAME).length;

      const s1 = [
        ['PASSENGER MANIFEST'],
        ['Event', EVENT.name],
        ['Date', EVENT.date],
        ['Venue', EVENT.venue],
        ['Boarding', EVENT.boarding],
        ['Scope', scopeLabel()],
        ['Bookings', rows.length],
        ['Total passengers', manifest.length],
        ['Names still missing', missing],
        ['Generated', new Date().toLocaleString('en-PH')],
        [],
        ['#', 'Guest Name', 'Lead Booker', 'Package', 'Spot / Table', 'Ticket Code', 'Status', 'Contact'],
      ].concat(manifest.map((m, i) => [i + 1, m.guest_name, m.lead, m.package, m.spot, m.ticket, m.status, m.phone]));

      const ws1 = XLSX.utils.aoa_to_sheet(s1);
      ws1['!cols'] = [{wch:5},{wch:30},{wch:26},{wch:16},{wch:18},{wch:14},{wch:12},{wch:16}];

      const s2 = [
        ['Booking ID','Lead Booker','Email','Phone','Instagram','Referred by','Package','Spot / Table','Pax','Total (PHP)','Status','Ticket Code','Guest Names','Created'],
      ].concat(rows.map((r) => [
        r.id, r.full_name, r.email, r.phone,
        r.instagram || '', r.referrer || '',
        r.package, spotLabel(r.table_id),
        r.guests, r.total_amount, r.status, r.ticket_code || '',
        (Array.isArray(r.guest_names) ? r.guest_names : []).join(', '),
        r.created_at ? new Date(r.created_at).toLocaleString('en-PH') : '',
      ]));

      const ws2 = XLSX.utils.aoa_to_sheet(s2);
      ws2['!cols'] = [{wch:38},{wch:24},{wch:26},{wch:14},{wch:16},{wch:16},{wch:16},{wch:18},{wch:6},{wch:12},{wch:12},{wch:14},{wch:60},{wch:20}];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws1, 'Passenger Manifest');
      XLSX.utils.book_append_sheet(wb, ws2, 'Bookings');
      XLSX.writeFile(wb, fileName('xlsx'));
    }

    function exportNamesExcel() {
      if (!window.XLSX) { alert('Excel library is still loading — give it a second and try again.'); return; }
      const rows = exportRows();
      if (!rows.length) { alert('Nothing to export in this view.'); return; }
      if (!scopeOk()) return;

      const manifest = buildManifest(rows);

      const aoa = [['#', 'Guest Name', 'Booked By', 'Ticket Code']].concat(
        manifest.map((m, i) => [i + 1, m.guest_name, m.lead, m.ticket])
      );

      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!cols'] = [{ wch: 5 }, { wch: 30 }, { wch: 28 }, { wch: 16 }];
      ws['!autofilter'] = { ref: 'A1:D' + aoa.length };

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Names');
      XLSX.writeFile(wb, fileName('xlsx', 'NameList'));
    }

    function exportPDF() {
      const JsPDF = window.jspdf && window.jspdf.jsPDF;
      if (!JsPDF) { alert('PDF library is still loading — give it a second and try again.'); return; }
      const rows = exportRows();
      if (!rows.length) { alert('Nothing to export in this view.'); return; }
      if (!scopeOk()) return;

      const manifest = buildManifest(rows);
      const missing = manifest.filter((m) => m.guest_name === NO_NAME).length;

      const doc = new JsPDF({ orientation: 'portrait', unit: 'pt', format: 'a4' });
      const W = doc.internal.pageSize.getWidth();
      const H = doc.internal.pageSize.getHeight();

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(15);
      doc.setTextColor(15, 15, 15);
      doc.text('PASSENGER MANIFEST', 40, 50);

      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      doc.setTextColor(90, 90, 90);
      doc.text(EVENT.name, 40, 66);
      doc.text(EVENT.date + '  ·  ' + EVENT.boarding, 40, 79);
      doc.text(EVENT.venue, 40, 92);

      doc.setTextColor(15, 15, 15);
      doc.text('Scope: ' + scopeLabel(), W - 40, 66, { align: 'right' });
      doc.text('Bookings: ' + rows.length, W - 40, 79, { align: 'right' });
      doc.text(
        'Passengers: ' + manifest.length + (missing ? '  (' + missing + ' name' + (missing === 1 ? '' : 's') + ' missing)' : ''),
        W - 40, 92, { align: 'right' }
      );

      const names = manifest.map((m) => m.guest_name);

      const head = [[]];
      for (let c = 0; c < PDF_COLUMNS; c++) head[0].push('#', 'Guest Name');

      const body = [];
      for (let i = 0; i < names.length; i += PDF_COLUMNS) {
        const row = [];
        for (let c = 0; c < PDF_COLUMNS; c++) {
          const idx = i + c;
          if (idx < names.length) row.push(idx + 1, names[idx]);
          else row.push('', '');
        }
        body.push(row);
      }

      const usable = W - 80;
      const numW = 26;
      const nameW = (usable / PDF_COLUMNS) - numW;
      const columnStyles = {};
      for (let c = 0; c < PDF_COLUMNS; c++) {
        columnStyles[c * 2]     = { cellWidth: numW, halign: 'right', textColor: [140, 140, 140] };
        columnStyles[c * 2 + 1] = { cellWidth: nameW };
      }

      doc.autoTable({
        startY: 112,
        head: head,
        body: body,
        theme: 'grid',
        styles: { font: 'helvetica', fontSize: 9, cellPadding: 4, lineColor: [205, 205, 205], lineWidth: 0.5, textColor: [25, 25, 25] },
        headStyles: { fillColor: [10, 26, 36], textColor: [245, 197, 24], fontStyle: 'bold', fontSize: 8 },
        alternateRowStyles: { fillColor: [248, 248, 245] },
        columnStyles: columnStyles,
        margin: { left: 40, right: 40, bottom: 60 },
        didDrawPage: function () {
          doc.setFont('helvetica', 'normal');
          doc.setFontSize(7.5);
          doc.setTextColor(130, 130, 130);
          doc.text('Generated ' + new Date().toLocaleString('en-PH'), 40, H - 26);
          doc.text('Page ' + doc.internal.getNumberOfPages(), W - 40, H - 26, { align: 'right' });
        },
      });

      let y = (doc.lastAutoTable ? doc.lastAutoTable.finalY : 112) + 40;
      if (y > H - 100) { doc.addPage(); y = 70; }

      doc.setDrawColor(150, 150, 150);
      doc.line(40, y, 250, y);
      doc.line(W - 250, y, W - 40, y);

      doc.setFontSize(8.5);
      doc.setTextColor(60, 60, 60);
      doc.text('Prepared by — Exclusives PH', 40, y + 14);
      doc.text('Received by — Manila Yacht Club', W - 250, y + 14);

      doc.save(fileName('pdf'));
    }

    $('export-xlsx').addEventListener('click', exportExcel);
    $('export-names').addEventListener('click', exportNamesExcel);
    $('export-pdf').addEventListener('click', exportPDF);

    // Master Select All Header Checkbox logic
    const selectAllCb = $('select-all-cb');
    if (selectAllCb) {
      selectAllCb.addEventListener('change', () => {
        document.querySelectorAll('.pending-cb').forEach((cb) => {
          cb.checked = selectAllCb.checked;
        });
      });
    }

    // Remind Pending Button Event Listener (with selective checked logic)
    $('remind-pending').addEventListener('click', async () => {
      const checkedEls = Array.from(document.querySelectorAll('.pending-cb:checked'));
      let targetRows = [];

      if (checkedEls.length > 0) {
        const checkedIds = new Set(checkedEls.map((el) => el.value));
        targetRows = allRows.filter((r) => checkedIds.has(r.id) && r.status === 'pending');
      } else {
        const allPending = allRows.filter((r) => r.status === 'pending');
        if (!allPending.length) {
          alert('There are currently no pending bookings to remind.');
          return;
        }
        if (!confirm(`No specific checkboxes selected.\n\nWould you like to send reminder emails to ALL ${allPending.length} pending booking(s)?`)) {
          return;
        }
        targetRows = allPending;
      }

      if (!targetRows.length) {
        alert('No valid pending bookings selected.');
        return;
      }

      const uniqueEmails = new Set(targetRows.map((r) => String(r.email).toLowerCase().trim()));
      const dups = targetRows.length - uniqueEmails.size;
      const selectedIds = targetRows.map((r) => r.id);

      let confirmMsg = `Send payment reminder emails to ${uniqueEmails.size} unique guest(s)?`;
      if (dups > 0) {
        confirmMsg += `\n\n(${dups} duplicate email address attempt${dups === 1 ? '' : 'es'} will automatically be skipped.)`;
      }

      if (!confirm(confirmMsg)) return;

      const btn = $('remind-pending');
      const originalText = btn.textContent;
      btn.textContent = 'Sending...';
      btn.disabled = true;
      btn.style.opacity = '0.5';

      try {
        const res = await fetch(`${API_BASE}/api/bookings/remind-pending`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'X-Admin-Key': adminKey
          },
          body: JSON.stringify({ booking_ids: selectedIds }),
        });
        if (res.status === 401) { showGate(); return; }
        const d = await res.json().catch(() => ({}));
        if (!res.ok) {
          alert((d && d.detail) || 'Could not send reminder emails.');
          return;
        }
        alert(`Success! Queued payment reminders for ${d.reminded_count} guest(s). ${d.duplicates_skipped} duplicate(s) skipped.`);
        document.querySelectorAll('.pending-cb:checked').forEach((cb) => cb.checked = false);
        if ($('select-all-cb')) $('select-all-cb').checked = false;
      } catch (e) {
        alert('Could not reach the backend server.');
      } finally {
        btn.textContent = originalText;
        btn.disabled = false;
        btn.style.opacity = '1';
      }
    });

    function render() {
      updateExportHint();
      if ($('select-all-cb')) $('select-all-cb').checked = false;

      const rows = currentFilter === 'all' ? allRows : allRows.filter((r) => r.status === currentFilter);
      const tbody = $('rows');
      if (!rows.length) {
        tbody.innerHTML = '';
        $('empty').textContent = 'No bookings in this view.';
        $('empty').classList.remove('hidden');
        return;
      }
      $('empty').classList.add('hidden');
      tbody.innerHTML = rows.map((r) => {
        const badge = STATUS_STYLE[r.status] || 'text-brand-muted border-white/10';
        const canCancel = r.status !== 'cancelled';
        const canApprove = r.status === 'verifying';
        const isPending = r.status === 'pending';
        const referrer = (r.referrer && String(r.referrer).trim()) ? esc(r.referrer) : '—';

        // Checkbox cell: active for pending, grayed out dash for confirmed/cancelled
        const cbCell = isPending
          ? `<input type="checkbox" class="pending-cb rounded bg-brand-obsidian border-white/20 accent-brand-gold cursor-pointer w-4 h-4" value="${esc(r.id)}">`
          : `<span class="text-brand-muted/30 text-xs">—</span>`;

        let igCell = '—';
        if (r.instagram && String(r.instagram).trim()) {
          let handle = String(r.instagram).trim().replace(/^@+/, '');
          igCell = `<a href="https://instagram.com/${esc(handle)}" target="_blank" class="text-cyan-300 hover:text-cyan-100">@${esc(handle)}</a>`;
        }
        let guestsCell = esc(r.guests);
        const gnames = Array.isArray(r.guest_names) ? r.guest_names.filter(function(n){ return String(n).trim(); }) : [];
        if (gnames.length) {
          const list = gnames.map(function(n, i){ return `<div class="text-xs text-brand-ice/80 py-0.5">${i+1}. ${esc(n)}</div>`; }).join('');
          guestsCell = `<details class="cursor-pointer"><summary class="text-brand-ice/90 select-none">${esc(r.guests)} <span class="text-brand-gold text-[10px] font-mono">names ▾</span></summary><div class="mt-2 bg-brand-obsidian/50 border border-white/5 rounded-lg p-2">${list}</div></details>`;
        } else if (Number(r.guests) > 0) {
          guestsCell = `${esc(r.guests)} <span class="text-amber-300 text-[10px] font-mono">no names</span>`;
        }
        const receiptLink = r.receipt_url ? `<a href="${esc(r.receipt_url)}" target="_blank" class="text-cyan-300 underline hover:text-cyan-100">View</a>` : '—';
        const pkgText = r.table_id ? `${esc(spotLabel(r.table_id))} · ${esc(r.package)}` : esc(r.package);

        let actionButtons = '';
        if (canApprove) {
           actionButtons += `<button data-approve="${esc(r.id)}" class="font-mono text-[10px] tracking-widest uppercase text-emerald-300 hover:text-emerald-200 border border-emerald-400/30 hover:border-emerald-300 rounded-full px-3 py-1 transition-colors mr-2">Approve</button>`;
        }
        if (canCancel) {
           actionButtons += `<button data-cancel="${esc(r.id)}" class="font-mono text-[10px] tracking-widest uppercase text-red-300 hover:text-red-200 border border-red-400/30 hover:border-red-300 rounded-full px-3 py-1 transition-colors">Cancel</button>`;
        }
        if (!actionButtons) {
           actionButtons = `<span class="text-brand-muted text-xs">—</span>`;
        }

        return `<tr class="hover:bg-brand-obsidian/30">
          <td class="px-4 py-3 text-center">${cbCell}</td>
          <td class="px-4 py-3">
            <div class="text-brand-ice">${esc(r.full_name)}</div>
            <div class="text-brand-muted text-xs font-mono">${esc(r.email)}</div>
          </td>
          <td class="px-4 py-3 text-brand-ice/90 font-mono text-xs">${igCell}</td>
          <td class="px-4 py-3 text-brand-ice/90">${referrer}</td>
          <td class="px-4 py-3 text-brand-ice/90">${pkgText}</td>
          <td class="px-4 py-3 text-brand-ice/90">${guestsCell}</td>
          <td class="px-4 py-3 text-brand-gold font-mono">${peso(r.total_amount)}</td>
          <td class="px-4 py-3 font-mono text-xs">${receiptLink}</td>
          <td class="px-4 py-3"><span class="font-mono text-[10px] tracking-widest uppercase border rounded-full px-2 py-1 ${badge}">${esc(r.status)}</span></td>
          <td class="px-4 py-3 font-mono text-xs text-brand-ice/80">${esc(r.ticket_code || '—')}</td>
          <td class="px-4 py-3 text-brand-muted text-xs font-mono">${fmtDate(r.created_at)}</td>
          <td class="px-4 py-3 text-right whitespace-nowrap">
            ${actionButtons}
          </td>
        </tr>`;
      }).join('');

      tbody.querySelectorAll('[data-cancel]').forEach((btn) => {
        btn.addEventListener('click', () => cancelBooking(btn.getAttribute('data-cancel')));
      });
      tbody.querySelectorAll('[data-approve]').forEach((btn) => {
        btn.addEventListener('click', () => approveBooking(btn.getAttribute('data-approve')));
      });
    }

    async function approveBooking(id) {
      if (!confirm('Approve this payment? This will finalize the booking and issue a ticket.')) return;
      try {
        const res = await fetch(`${API_BASE}/api/bookings/${id}/approve`, {
          method: 'POST',
          headers: { 'X-Admin-Key': adminKey },
        });
        if (res.status === 401) { showGate(); return; }
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          alert((d && d.detail) || 'Could not approve booking.');
          return;
        }
        load();
      } catch (e) {
        alert('Could not reach the server.');
      }
    }

    async function cancelBooking(id) {
      if (!confirm('Cancel this booking? This frees their spots and cannot be undone here.')) return;
      try {
        const res = await fetch(`${API_BASE}/api/bookings/${id}/cancel`, {
          method: 'POST',
          headers: { 'X-Admin-Key': adminKey },
        });
        if (res.status === 401) { showGate(); return; }
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          alert((d && d.detail) || 'Could not cancel booking.');
          return;
        }
        load();
      } catch (e) {
        alert('Could not reach the server.');
      }
    }

    (async function boot() {
      if (adminKey && await tryKey(adminKey).catch(() => false)) {
        showDash();
        load();
      } else {
        showGate();
      }
    })();
  })();
  </script>
</body>
</html>
